name: Run Chronos-2 Forecast

on:
  pull_request: # Automatically test workflow on Pull Requests before merging
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  forecast:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref_name }} # Checkout branch directly on PRs to allow pushing

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas "chronos-forecasting[extras]>=2.2"

    - name: Run Chronos-2 Forecast
      run: |
        if [ -f auslastung_live.csv ]; then
          python example_forecast.py
        else
          echo "auslastung_live.csv not found, skipping forecast."
        fi

    - name: Commit and push forecast results
      run: |
        if [ -f forecast_results.csv ]; then
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add forecast_results.csv
          git commit -m "docs: generate new chronos-2 forecast" || echo "No new forecast to commit"
          git push
        else
          echo "forecast_results.csv not found, skipping commit."
        fi