name: Run Chronos-2 Forecast

on:
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  forecast:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas "chronos-forecasting>=2.0"

    - name: Run Chronos-2 Forecast
      run: python example_forecast.py

    - name: Commit and push forecast results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add forecast_results.csv
        git commit -m "docs: generate new chronos-2 forecast" || echo "No new forecast to commit"
        git push