name: Scrape SWM Auslastung

on:
  pull_request: # Automatically test workflow on Pull Requests before merging
  workflow_dispatch: # Allows manual triggering

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref_name }} # Checkout branch directly on PRs to allow pushing

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install pandas

    - name: Run scraper script
      run: |
        echo "Action triggered at $(date -u)" >> execution.log
        python swm_auslastung.py

    - name: Process data into 30m grid
      run: python process_auslastung.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add auslastung_raw.csv auslastung_live.csv execution.log scraper.log
        git commit -m "chore: update auslastung data" || echo "No changes to commit"
        git push

    - name: Keepalive Workflow
      uses: liskin/gh-workflow-keepalive@v1
