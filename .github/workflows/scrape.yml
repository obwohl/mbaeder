name: Scrape SWM Auslastung

on:
  pull_request: # Automatically test workflow on Pull Requests before merging
  schedule:
    - cron: '14,44 * * * *' # Runs every 30 minutes (off-peak to avoid GitHub Actions delays)
  workflow_dispatch: # Allows manual triggering

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        ref: ${{ github.head_ref || github.ref_name }} # Checkout branch directly on PRs to allow pushing

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run scraper script
      run: python swm_auslastung.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add auslastung_live.csv
        git commit -m "chore: update auslastung_live.csv" || echo "No changes to commit"
        git push

    - name: Keepalive Workflow
      uses: liskin/gh-workflow-keepalive@v1
